<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>LigaManager Pro</title>
  <script>
    // SPA routing for GitHub Pages — preserves the path after the repo segment
    var seg = 1;
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.host +
      l.pathname.split('/').slice(0, 1 + seg).join('/') + '/?p=/' +
      l.pathname.slice(1).split('/').slice(seg).join('/').replace(/&/g, '~and~') +
      (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body></body>
</html>
